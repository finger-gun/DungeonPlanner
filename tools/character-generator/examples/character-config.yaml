base_prompt: |
  Fantasy tabletop character of a single full-body fantasy character.
  Style: pen and ink with muted earthy watercolor wash, bold black outlines, gritty dark fantasy aesthetic, crosshatching shading.
  Expression: {furrowed brows and tightly pressed lips|relaxed face with neutral mouth and steady gaze|eyes wide open with flared nostrils and bared teeth|chin tilted slightly up with a smirk|downcast eyes with an unfocused gaze and slight frown|squinting eyes with head tilted down and tense jaw|wide smile showing teeth with raised eyebrows|gritted teeth and intensely furrowed brows|completely blank face with unblinking stare|one eyebrow raised with an asymmetrical smirk|heavy eyelids and relaxed jaw with a slight smile|biting lower lip with wide eyes and wrinkled forehead|narrowed eyes and perfectly straight mouth|gentle open smile with relaxed forehead|watery eyes looking down with downturned mouth corners}.
  Pose: {standing with legs wide apart and arms crossed|crouching low with one hand touching the ground|leaping forward with weapon raised|kneeling on one knee with head bowed|standing straight with hands resting on hips|leaning back with one foot raised|walking forward with weapons drawn|sitting cross-legged|lunging sideways with an outstretched arm|standing sideways looking over the shoulder|holding weapon with both hands ready to strike|standing tall with arms raised above head|lying prone aiming forward|weight shifted to one leg with hand on weapon hilt|mid-run with arms pumping}.
  Extra details: {jagged pale scars on face and arms|thick brown mud splattered on boots|frayed and tattered edges on a long cloak|a necklace of jagged animal teeth|small wooden carvings tied to the belt|mismatched square fabric patches sewn onto clothing|tarnished brass buckles securing straps|thick crisscrossing leather belts over the chest|copper wire wrapped around rough stones|chipped blade with a scuffed hilt|glowing geometric runes painted on the skin|dark black ink smudges on fingertips|charred and blackened edges on clothing|intricate black lines tattooed across the forehead|long tight braids tied with leather cord|brightly colored bird feathers woven into hair|white bird skulls hanging from a shoulder strap|a bulging leather pouch hanging from the waist belt|tightly rolled parchment tubes sticking out of a satchel|softly glowing blue light emitting from an amulet|an ornate silver ring with a large red gemstone|a heavy steel hammer hanging from the belt|deep gouges and dents in the armor plates|highly polished metal and freshly oiled leather}.
  Centered character, clearly readable, full body, visible from head to toe, strong silhouette, clean crisp edges, polished fantasy concept art, tabletop RPG book illustration style, detailed materials, even lighting, clear white background, no scenery, no environment, no floor, no shadows on ground.
width: 1024
height: 1024
